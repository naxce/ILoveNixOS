general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = rgb(ffffff)
    col.inactive_border = rgb(1a1a1a)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000090)
        offset = 0 4
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        contrast = 1.0
        brightness = 0.9
        noise = 0.02
    }
}

animations {
    enabled = true

    bezier = expo, 0.16, 1, 0.3, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 3, expo, popin 82%
    animation = windowsOut, 1, 3, expo, popin 82%
    animation = border, 1, 6, linear
    animation = fade, 1, 3, expo
    animation = workspaces, 1, 4, expo, slide
    animation = specialWorkspace, 1, 3, expo, slidevert
    animation = layers, 1, 3, expo, popin 80%
}

dwindle {
    preserve_split = true
    smart_resizing = true
    force_split = 2
}

master {
    new_status = master
    mfact = 0.55
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = rgb(000000)
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = false
    focus_on_activate = true
    vrr = 1
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
}

cursor {
    no_hardware_cursors = true
    inactive_timeout = 0
}
