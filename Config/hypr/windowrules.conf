windowrule = float on, match:class pavucontrol
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class zenity
windowrule = float on, match:class swappy
windowrule = float on, match:class hotkeys-menu
windowrule = size 55% 70%, match:class hotkeys-menu
windowrule = center 1, match:class hotkeys-menu

windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$
windowrule = move 73% 71%, match:title ^(Picture-in-Picture)$

windowrule = no_anim on, match:workspace special:minimized

# control-center is a layer-shell surface (namespace "control-center"), not
# a normal toplevel, so it never goes through the float/tiling windowrule
# pipeline above. It needs its own layerrule instead of a windowrule.
# Block syntax (rather than the older comma-separated line syntax) is used
# here because it's the form that stays valid across recent Hyprland
# releases without tripping "invalid field: missing a value" parse errors.
#
# blur is intentionally off: Hyprland can only blur a rectangle behind a
# layer surface (it has no concept of the surface's actual rounded shape),
# so the square blur region was showing through around our panel's rounded
# corners as a flat gray halo, with only the top edge (closest to the
# anchor) looking properly rounded. The panel's own CSS background
# (rgba(8,8,8,0.88) in control-center.css) already gives it a solid dark
# translucent look on its own, same as swaync's panel elsewhere in this
# config, which also doesn't use layer blur.
#
# There's no compositor-side shadow toggle for layer surfaces (that field
# only exists for windowrule/workspace_rule) — the global shadow in
# looknfeel.conf's decoration { shadow { ... } } block only applies to
# regular windows/toplevels, not layer-shell surfaces, so it was never the
# cause of the gray halo here; blur was.
layerrule {
    name = control_center_popover
    match:namespace = control-center
    blur = false
    animation = popin 80%
}

windowrule = opacity 0.94 0.88, match:class kitty
windowrule = opacity 0.94 0.88, match:class yazi-fm
windowrule = opacity 0.96 0.9, match:class hotkeys-menu
windowrule = rounding 10, match:class hotkeys-menu
windowrule = rounding 10, match:class yazi-fm
windowrule = opacity 0.97 0.9, match:class firefox

windowrule = suppress_event maximize, match:class .*
