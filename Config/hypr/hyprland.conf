source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/autostart.conf

source = ~/.config/hypr/local/monitors.conf
source = ~/.config/hypr/local/looknfeel.conf
source = ~/.config/hypr/local/input.conf
source = ~/.config/hypr/local/gaming.conf

env = XCURSOR_SIZE,20
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,20
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

env = GTK_THEME,adw-gtk3-dark
env = QT_QPA_PLATFORMTHEME,qt6ct

$terminal = kitty
$fileManager = kitty --class yazi-fm --name yazi-fm --title "Yazi Noir" yazi
$menu = rofi -show drun
