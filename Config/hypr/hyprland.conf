# Config/hypr/hyprland.conf

monitor=,preferred,auto,1

$mod = SUPER
$terminal = kitty
$menu = rofi -show drun -show-icons

exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = wl-paste --type text --watch cliphist store
exec-once = hypridle

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(45475aaa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 5
        passes = 3
        new_optimizations = true
        xray = false
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1e1e2ecc)
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 5, wind, slide
    animation = windowsOut, 1, 5, wind, slide
    animation = fade, 1, 8, default
    animation = workspaces, 1, 4, wind
    animation = border, 1, 1, liner
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

input {
    kb_layout = pl
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}

# Gaming
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = noblur, class:^(steam_app_.*)$
windowrulev2 = noshadow, class:^(steam_app_.*)$
windowrulev2 = noanim, class:^(steam_app_.*)$

# Floating
windowrulev2 = float, class:^(thunar)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, title:^(Steam)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(thunar)$
windowrulev2 = size 1000 650, class:^(thunar)$

# Kitty work
windowrulev2 = float, class:^(kitty-work)$
windowrulev2 = size 1200 700, class:^(kitty-work)$
windowrulev2 = center, class:^(kitty-work)$

# Keybinds
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, Space, exec, $menu
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod SHIFT, E, exit

# Scratchpad
bind = $mod, grave, togglespecialworkspace, scratchpad
bind = $mod SHIFT, grave, movetoworkspace, special:scratchpad

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Resize
binde = $mod SHIFT, right, resizeactive, 50 0
binde = $mod SHIFT, left, resizeactive, -50 0
binde = $mod SHIFT, up, resizeactive, 0 -50
binde = $mod SHIFT, down, resizeactive, 0 50

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-