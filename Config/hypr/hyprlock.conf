general {
    disable_loading_bar = true
    hide_cursor = false
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/Pictures/wallpapers/noir.png
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.65
    vibrancy = 0.1
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.95)
    font_size = 92
    font_family = Inter
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(180, 180, 180, 0.85)
    font_size = 18
    font_family = Inter
    position = 0, 40
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/Pictures/wallpapers/avatar.png
    size = 96
    border_size = 2
    border_color = rgba(255, 255, 255, 0.9)
    rounding = -1
    position = 0, -30
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(232, 232, 232, 0.9)
    font_size = 15
    font_family = Inter
    position = 0, -95
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 260, 46
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.06)
    font_color = rgba(232, 232, 232, 1)
    fade_on_empty = false
    placeholder_text = <span foreground="##707070">Enter password</span>
    hide_input = false
    rounding = 10
    check_color = rgba(255, 255, 255, 0.9)
    fail_color = rgba(255, 80, 80, 0.9)
    fail_text = <span foreground="##ff5050">Incorrect password</span>
    fail_transition = 200
    position = 0, -155
    halign = center
    valign = center
}

label {
    monitor =
    text = Press Enter to unlock
    color = rgba(112, 112, 112, 0.7)
    font_size = 12
    font_family = Inter
    position = 0, -215
    halign = center
    valign = center
}
