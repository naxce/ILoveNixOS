format = """
[┌─](fg:border) $username$hostname[ in ](fg:muted)$directory$git_branch$git_status
[└─](fg:border)$character"""

right_format = """$cmd_duration$nix_shell"""

add_newline = true
palette = "noir"

[palettes.noir]
bg       = "#000000"
bg_alt   = "#1a1a1a"
border   = "#4d4d4d"
muted    = "#8a8a8a"
subtle   = "#b0b0b0"
fg       = "#e8e8e8"
white    = "#ffffff"
error    = "#ffffff"

[username]
show_always = true
style_user = "fg:white bold"
style_root = "fg:white bold underline"
format = "[$user]($style)"

[hostname]
ssh_only = false
format = "[@$hostname]($style)"
style = "fg:muted"

[directory]
style = "fg:white bold"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "fg:subtle"

[directory.substitutions]
"~/NixOS" = "󱄅 NixOS"

[git_branch]
symbol = " "
style = "fg:subtle"
format = "on [$symbol$branch]($style) "

[git_status]
style = "fg:muted"
format = "[$all_status$ahead_behind]($style)"
conflicted = "󰞇 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "? "
stashed = "󰆼 "
modified = "! "
staged = "+${count} "
renamed = "󰑕 "
deleted = "✘ "

[character]
success_symbol = "[❯](fg:white bold)"
error_symbol = "[❯](fg:white bold underline)"
vimcmd_symbol = "[❮](fg:subtle bold)"

[cmd_duration]
min_time = 2000
format = "[  $duration]($style) "
style = "fg:muted"

[nix_shell]
symbol = "󱄅 "
format = "[$symbol$state]($style) "
style = "fg:subtle"

[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
[java]
disabled = true

[package]
disabled = true

[line_break]
disabled = false
