[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = true
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 8
mouse_events = ["click", "scroll"]

[preview]
wrap = "yes"
tab_size = 2
max_width = 1600
max_height = 2400
image_delay = 20
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
  { run = 'nvim %s', block = true, desc = "Edit in Neovim", for = "unix" },
]
open = [
  { run = 'xdg-open %s1', orphan = true, desc = "Open with system default", for = "unix" },
]
reveal = [
  { run = 'kitty --class yazi-fm --name yazi-fm --title "Yazi Noir" yazi %d', orphan = true, desc = "Open parent in Yazi", for = "unix" },
]
extract = [
  { run = 'ouch decompress %s', block = true, desc = "Extract here with ouch", for = "unix" },
]
archive_list = [
  { run = 'ouch list %s', block = true, desc = "List archive contents", for = "unix" },
]

[open]
prepend_rules = [
  { url = "*.zip", use = ["extract", "archive_list", "open"] },
  { url = "*.7z", use = ["extract", "archive_list", "open"] },
  { url = "*.rar", use = ["extract", "archive_list", "open"] },
  { url = "*.tar", use = ["extract", "archive_list", "open"] },
  { url = "*.tar.gz", use = ["extract", "archive_list", "open"] },
  { url = "*.tgz", use = ["extract", "archive_list", "open"] },
  { url = "*.tar.bz2", use = ["extract", "archive_list", "open"] },
  { url = "*.tbz2", use = ["extract", "archive_list", "open"] },
  { url = "*.tar.xz", use = ["extract", "archive_list", "open"] },
  { url = "*.txz", use = ["extract", "archive_list", "open"] },
  { url = "*.tar.zst", use = ["extract", "archive_list", "open"] },
  { url = "*.gz", use = ["extract", "archive_list", "open"] },
  { url = "*.bz2", use = ["extract", "archive_list", "open"] },
  { url = "*.xz", use = ["extract", "archive_list", "open"] },
  { url = "*.zst", use = ["extract", "archive_list", "open"] },
  { mime = "application/{zip,x-zip,x-zip-compressed,x-7z-compressed,vnd.rar,x-rar,x-rar-compressed,x-tar,gzip,x-gzip,x-bzip,x-bzip2,x-xz,zstd,x-zstd,x-compressed-tar,x-bzip-compressed-tar,x-xz-compressed-tar,x-zstd-compressed-tar}", use = ["extract", "archive_list", "open"] },
  { url = "*.nix", use = ["edit", "open"] },
  { url = "*.conf", use = ["edit", "open"] },
  { url = "*.toml", use = ["edit", "open"] },
  { url = "*.json", use = ["edit", "open"] },
  { url = "*.jsonc", use = ["edit", "open"] },
  { url = "*.md", use = ["edit", "open"] },
  { mime = "text/*", use = ["edit", "open"] },
  { mime = "image/*", use = "open" },
  { mime = "{audio,video}/*", use = "open" },
  { mime = "application/pdf", use = "open" },
]
append_rules = [
  { url = "*", use = "open" },
]

[input]
cursor_blink = false

[which]
sort_by = "key"
sort_sensitive = false
sort_reverse = false
sort_translit = true
