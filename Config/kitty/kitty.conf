allow_remote_control yes
listen_on unix:/tmp/kitty-kwork.sock

background            #000000
foreground            #e8e8e8
background_opacity    0.88
background_blur       40
window_padding_width   15
confirm_os_window_close 0

window_margin_width   10
window_border_width   1pt
active_border_color   #ffffff
inactive_border_color #1a1a1a
draw_minimal_borders  yes

hide_window_decorations yes

cursor             #ffffff
cursor_text_color  #000000
cursor_shape       beam
cursor_beam_thickness 1.5

color0  #0d0d0d
color8  #4d4d4d
color1  #d16969
color9  #f07070
color2  #7ec699
color10 #92e0ac
color3  #d7ba7d
color11 #e8cf94
color4  #7fa8d0
color12 #96bde0
color5  #b48ead
color13 #c9a0c4
color6  #6ec6c1
color14 #85dcd7
color7  #b0b0b0
color15 #ffffff

linux_display_server wayland
shell_integration no-rc
repaint_delay 10
input_delay 3
sync_to_monitor yes
